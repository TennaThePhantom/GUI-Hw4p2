<!doctype html>
<html lang="en">
	<head>
		<!--
File: index.html
GUI Assignment: HW4 Multiplication Table with JQuery Part 2
Name: Tennessee Foster
Email: tennessee_foster@student.uml.edu
Created/modify 6/14/2026:
Description: Multiplication table with jQuery Validation And JQuery UI Features Part 2
-->
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Multiplication Table/HW4P2</title>

		<!-- bootstrap css -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>

		<!-- jQuery UI css -->
		<link
			rel="stylesheet"
			href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.13.2/themes/ui-darkness/jquery-ui.css"
		/>

		<!-- jQuery library -->
		<script src="https://code.jquery.com/jquery-3.7.1.js"></script>

		<!-- JQuery ui library for sliders and tabs -->
		<script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>

		<!-- jQuery Validation plugin validation -->
		<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body class="bg-dark">
		<div class="container py-4">
			<!-- page Header -->
			<div class="text-center mb-4">
				<h1 class="main-text-color">Multiplication Table Generator</h1>
				<p class="text-secondary">Enter number ranges to create your table</p>
			</div>

			<!-- JQuery ui tab container -->
			<div id="tabs">
				<!-- tab navigation -->
				<ul>
					<li><a href="#main-generator">Generator</a></li>
				</ul>

				<!-- Main generator Tab content(first thing u see ) -->
				<div id="main-generator">
					<!-- input form for user -->
					<div class="card bg-secondary bg-opacity-25 mb-4">
						<div class="card-body">
							<form id="tableForm" novalidate>
								<!-- horizontal axis inputs (Row) -->
								<div class="mb-4">
									<label class="form-label text-light fw-bold">
										Horizontal Axis (Row)
									</label>

									<!-- min X input -->
									<div class="mb-2">
										<div class="input-group">
											<span
												class="input-group-text main-button-text-background text-white"
											>
												Min Number
											</span>
											<input
												type="number"
												id="minX"
												name="minX"
												class="form-control bg-dark text-light"
												value="1"
												step="1"
											/>
										</div>
										<div id="slider-minX" class="mt-2 mx-1 mb-3"></div>
									</div>

									<!-- Max X Input -->
									<div>
										<div class="input-group">
											<span class="input-group-text bg-secondary text-white">
												Max Number
											</span>
											<input
												type="number"
												id="maxX"
												name="maxX"
												class="form-control bg-dark text-light"
												value="5"
												step="1"
											/>
										</div>
										<div id="slider-maxX" class="mt-2 mx-1 mb-3"></div>
									</div>
									<div class="form-text text-secondary mt-2">
										Please enter numbers from -50 to 50
									</div>
								</div>

								<!-- vertical Axis inputs Column) -->
								<div class="mb-4">
									<label class="form-label text-light fw-bold">
										Vertical Axis (Column)
									</label>

									<!-- min Y input -->
									<div class="mb-2">
										<div class="input-group">
											<span
												class="input-group-text main-button-text-background text-white"
											>
												Min Number
											</span>
											<input
												type="number"
												id="minY"
												name="minY"
												class="form-control bg-dark text-light"
												value="1"
												step="1"
											/>
										</div>
										<div id="slider-minY" class="mt-2 mx-1 mb-3"></div>
									</div>

									<!-- max Y input -->
									<div>
										<div class="input-group">
											<span class="input-group-text bg-secondary text-white">
												Max Number
											</span>
											<input
												type="number"
												id="maxY"
												name="maxY"
												class="form-control bg-dark text-light"
												value="5"
												step="1"
											/>
										</div>
										<div id="slider-maxY" class="mt-2 mx-1 mb-3"></div>
									</div>
									<div class="form-text text-secondary mt-2">
										Please enter numbers from -50 to 50
									</div>
								</div>

								<!-- main Buttons for table (rest save and delete)-->
								<div class="text-center mt-4">
									<!-- Save tAble to new tab -->
									<button
										type="submit"
										class="btn main-button-text-background generate-button px-4 text-white"
									>
										Save Table
									</button>

									<!-- reset all inputs -->
									<button
										type="button"
										id="resetBtn"
										class="btn btn-secondary px-4 ms-2"
									>
										Reset
									</button>

									<!-- delete selected tabs -->
									<button
										type="button"
										id="deleteSelectedTabsBtn"
										class="btn btn-outline-danger px-4 ms-2"
									>
										Delete Selected Tabs
									</button>
								</div>
							</form>
						</div>
					</div>

					<!-- Error pop up message -->
					<div id="errorArea" class="mb-3"></div>

					<!-- table preview live -->
					<div class="mt-4">
						<h4
							class="text-light text-center mb-3 pb-2 border-bottom border-secondary"
						>
							Live Table Preview
						</h4>
						<div class="table-container">
							<div id="tableDisplay" class="text-center text-secondary p-5">
								<!--Placeholder in case live preview doesn't load(JS)-->
								Enter numbers and adjust sliders to see the table dynamically
								update here.
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script src="./javascript/script.js"></script>
	</body>
</html>
